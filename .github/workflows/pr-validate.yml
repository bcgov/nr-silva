name: PR Validate

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      deployment_successful:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-edit-${{ inputs.pr_number }}
  cancel-in-progress: true

permissions: {}

jobs:
  check_deployment:
    name: Check Deployment Status
    runs-on: ubuntu-24.04
    outputs:
      should_continue: ${{ steps.check.outputs.should_continue }}
    steps:
      - name: Check deployment status
        id: check
        run: |
          if [ "${{ inputs.deployment_successful }}" = "true" ]; then
            echo "✅ Deployment was successful, proceeding with validation"
            echo "should_continue=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Deployment failed, skipping route validation"
            echo "should_continue=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  get_routes:
    name: Get PR Routes
    needs: [check_deployment]
    if: ${{ needs.check_deployment.outputs.should_continue == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Get all PR routes
        id: oc_routes
        uses: bcgov/action-oc-runner@v1.4.0
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO_NAME: ${{ github.event.repository.name }}
        with:
          oc_namespace: ${{ vars.OC_NAMESPACE }}
          oc_server: ${{ vars.OC_SERVER }}
          oc_token: ${{ secrets.OC_TOKEN }}
          commands: |
            oc get routes -o json > routes.json
            for type in hybrid postgres; do
              for comp in frontend backend; do
                route_name="${REPO_NAME}-${PR_NUMBER}-${type}-${comp}"
                route_host=$(jq -r ".items[] | select(.metadata.name==\"$route_name\") | .spec.host" routes.json)
                echo "${type}_${comp}_host=$route_host" >> $GITHUB_OUTPUT
              done
            done
    outputs:
      hybrid_frontend_host: ${{ steps.oc_routes.outputs.hybrid_frontend_host }}
      hybrid_backend_host: ${{ steps.oc_routes.outputs.hybrid_backend_host }}
      postgres_frontend_host: ${{ steps.oc_routes.outputs.postgres_frontend_host }}
      postgres_backend_host: ${{ steps.oc_routes.outputs.postgres_backend_host }}

  validate:
    name: Validate PR
    needs: [check_deployment, get_routes]
    if: ${{ needs.check_deployment.outputs.should_continue == 'true' }}
    uses: bcgov/quickstart-openshift-helpers/.github/workflows/.pr-validate.yml@6d695dd755fa9255ea4bde335890516beb6f95e4 # v1.0.1
    permissions:
      pull-requests: write
    with:
      markdown_links: |
        - [Hybrid Backend](https://${{ needs.get_routes.outputs.hybrid_backend_host }}/actuator/health)
        - [Hybrid Frontend](https://${{ needs.get_routes.outputs.hybrid_frontend_host }})
        - [Postgres Backend](https://${{ needs.get_routes.outputs.postgres_backend_host }}/actuator/health)
        - [Postgres Frontend](https://${{ needs.get_routes.outputs.postgres_frontend_host }})

  results:
    name: Validate Results
    if: always()
    needs: [check_deployment, get_routes, validate]
    runs-on: ubuntu-24.04
    steps:
      - name: Log validation results
        run: |
          echo "Check deployment result: ${{ needs.check_deployment.result }}"
          echo "Get routes result: ${{ needs.get_routes.result }}"
          echo "Validate result: ${{ needs.validate.result }}"

      - if: ${{ needs.check_deployment.result == 'failure' }}
        run: |
          echo "❌ Validation failed because deployment was not successful"
          exit 1

      - if: contains(needs.*.result, 'failure') && needs.check_deployment.result == 'success'
        run: |
          echo "❌ Validation failed during route checking or validation steps"
          exit 1

      - run: |
          echo "✅ Validation completed successfully"
